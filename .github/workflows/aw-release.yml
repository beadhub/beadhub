name: aw Sync and Release

# When we tag aw-vX.Y.Z on aweb, this workflow pushes cli/go/ to the
# awebai/aw repo with tag vX.Y.Z. The aw repo's own release workflow
# then handles goreleaser (binaries) and npm publishing.
#
# Uses AW_REPO_TOKEN (PAT with Contents write on awebai/aw) so the
# push triggers the aw repo's release workflow. Deploy keys don't
# trigger workflows.

on:
  push:
    tags:
      - 'aw-v*'

jobs:
  sync-to-aw:
    name: Sync cli/go to awebai/aw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aweb
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#aw-v}" >> "$GITHUB_OUTPUT"

      - name: Push cli/go to awebai/aw
        env:
          AW_REPO_TOKEN: ${{ secrets.AW_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Clone aw repo using PAT (so the push triggers workflows)
          git clone "https://x-access-token:${AW_REPO_TOKEN}@github.com/awebai/aw.git" /tmp/aw-release
          cd /tmp/aw-release

          # Remove everything except .git
          git rm -rf . > /dev/null 2>&1 || true
          git clean -fdx

          # Copy cli/go contents (this is the aw source)
          cp -a "$GITHUB_WORKSPACE/cli/go/." .

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No code changes to sync"
          else
            git commit -m "Sync from awebai/aweb aw-v${VERSION}"
            git push origin main
          fi

          # Always tag and push the tag (triggers the aw release workflow)
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          echo "Pushed v${VERSION} to awebai/aw — release workflow will take over"
