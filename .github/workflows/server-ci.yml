name: Server CI

on:
  push:
    paths:
      - ".github/workflows/server-ci.yml"
      - "server/**"
  pull_request:
    paths:
      - ".github/workflows/server-ci.yml"
      - "server/**"

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build package
        working-directory: server
        run: uv build

      - name: Smoke test installed wheel
        working-directory: server
        run: |
          python -m venv /tmp/aweb-wheel-smoke
          /tmp/aweb-wheel-smoke/bin/pip install dist/*.whl
          /tmp/aweb-wheel-smoke/bin/aweb --help

      - name: Run server test suite
        working-directory: server
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: uv run pytest

      - name: Validate compose file
        working-directory: server
        env:
          POSTGRES_PASSWORD: testpass
        run: docker compose config
